<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box }
    body { background: #000; width: 100vw; height: 100vh; overflow: hidden }
    img { width: 100%; height: 100%; object-fit: contain; display: block }
  </style>
</head>
<body>
  <img id="p">
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script>
    var NS  = 'urn:x-cast:com.infinityretouch.theater';
    var ctx = cast.framework.CastReceiverContext.getInstance();
    var base = null, lastVer = null;

    // Recebe mensagem do app Android:
    //   { url: "http://192.168.x.x:8080" }  — no primeiro connect
    //   { ver: "1234567890" }                — a cada nova foto
    ctx.addCustomMessageListener(NS, function(e) {
      var d = e.data;
      if (d.url) base = d.url;
      if (d.ver && d.ver !== lastVer) {
        lastVer = d.ver;
        document.getElementById('p').src = base + '/cast_photo.jpg?t=' + d.ver;
      }
    });

    // Polling de segurança: garante atualização mesmo se mensagem se perder
    setInterval(function() {
      if (!base) return;
      fetch(base + '/version?r=' + Date.now())
        .then(function(r) { return r.text(); })
        .then(function(v) {
          v = v.trim();
          if (v !== lastVer) {
            lastVer = v;
            document.getElementById('p').src = base + '/cast_photo.jpg?t=' + v;
          }
        }).catch(function() {});
    }, 1000);

    ctx.start();
  </script>
</body>
</html>
