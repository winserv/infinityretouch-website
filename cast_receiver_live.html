<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box }
    body { background: #000; width: 100vw; height: 100vh; overflow: hidden }
    img { width: 100%; height: 100%; object-fit: contain; display: block }
  </style>
</head>
<body>
  <img id="p" alt="">
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script>
    var NS  = 'urn:x-cast:com.infinityretouch.live';
    var ctx = cast.framework.CastReceiverContext.getInstance();
    var base = null;
    var img  = document.getElementById('p');
    var busy = false;

    ctx.addCustomMessageListener(NS, function(e) {
      if (e.data && e.data.url && !base) {
        base = e.data.url;
        pump();
      }
    });

    // Chain loading: dispara o próximo frame imediatamente após o atual carregar.
    // Elimina o round-trip extra de /version e o timer fixo de 200ms.
    // Auto-throttle natural pela velocidade da rede — em Wi-Fi 5GHz local: ~15-25fps.
    function pump() {
      if (!base || busy) return;
      busy = true;
      var tmp = new Image();
      tmp.onload = function() {
        img.src = tmp.src;
        busy = false;
        pump();
      };
      tmp.onerror = function() {
        busy = false;
        setTimeout(pump, 200);
      };
      tmp.src = base + '/cast_photo.jpg?t=' + Date.now();
    }

    var options = new cast.framework.CastReceiverOptions();
    options.maxInactivity = 3600;
    ctx.start(options);
  </script>
</body>
</html>
